{% extends "core/base.html" %} 

{% block title %}Clinician biodata{% endblock %} 

{% block content %}

<h1 class="bg-purple-800 p-4 text-3xl text-white">Clinician Biodata</h1>
<div class="p-6 bg-gray-200">
    <p class="text-2xl mb-4">Pls, fill your biodata</p>
    <form action="{% url 'clinicians:biodata' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{form.as_p}}
        <button name="submit">submit</button>
    </form>
</div>

{% endblock %}
